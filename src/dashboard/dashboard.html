<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WILO — Pressure Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #070709;
    --panel:     #0e0e12;
    --border:    #1e1e28;
    --amber:     #f5a623;
    --amber-dim: #7a5010;
    --green:     #2dff7e;
    --red:       #ff3b3b;
    --text:      #c8c8d8;
    --muted:     #44445a;
    --mono:      'Share Tech Mono', monospace;
    --display:   'Bebas Neue', cursive;
    --ui:        'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--ui);
    overflow: hidden;
  }

  /* grid texture */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(245,166,35,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* noise overlay */
  body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    opacity: .04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  .shell {
    position: relative; z-index: 1;
    display: grid;
    grid-template-rows: 48px 1fr 160px 52px;
    height: 100vh;
    padding: 0 28px 0;
    gap: 0;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding: 0 4px;
  }
  .logo {
    font-family: var(--display);
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--amber);
  }
  .logo span { color: var(--muted); font-size: 13px; font-family: var(--mono); letter-spacing: 2px; margin-left: 14px; }
  .hdr-right { display: flex; align-items: center; gap: 20px; }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted);
    box-shadow: none;
    transition: background .3s, box-shadow .3s;
  }
  .conn-dot.live {
    background: var(--green);
    box-shadow: 0 0 8px var(--green), 0 0 20px rgba(45,255,126,.3);
    animation: pulse-dot 2s infinite;
  }
  .conn-dot.fault { background: var(--red); box-shadow: 0 0 8px var(--red); animation: blink .6s infinite; }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
  .conn-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  /* ── Main readout grid ── */
  .readout {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  .metric-card {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 18px 24px 14px;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }
  .metric-card::after {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(135deg, rgba(245,166,35,.03) 0%, transparent 60%);
  }
  .metric-card.primary { padding: 22px 28px 18px; }

  .metric-label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #ffffff;
    text-transform: uppercase;
  }

  .metric-val {
    font-family: var(--display);
    line-height: 1;
    color: var(--amber);
    transition: color .15s;
  }
  .metric-val.sz-xl  { font-size: clamp(72px, 10vw, 120px); }
  .metric-val.sz-lg  { font-size: clamp(56px, 7vw, 90px); }
  .metric-val.sz-md  { font-size: clamp(36px, 4vw, 58px); }

  .metric-val.flash  { animation: numflash .25s ease-out; }
  .metric-val.fault-val { color: var(--red) !important; text-shadow: 0 0 30px rgba(255,59,59,.3); }

  @keyframes numflash {
    0%   { text-shadow: 0 0 0px var(--amber), 0 0 40px rgba(245,166,35,.9); color: #fff; }
    100% { text-shadow: none; color: var(--amber); }
  }

  .metric-unit {
    font-family: var(--mono);
    font-size: 14px;
    color: #ffffff;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .status-badge {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 3px;
    padding: 6px 16px;
    border-radius: 2px;
    border: 1px solid;
    text-transform: uppercase;
    transition: all .3s;
    display: inline-block;
    margin-top: 4px;
  }
  .status-badge.ok    { color: var(--green); border-color: var(--green); background: rgba(45,255,126,.06); box-shadow: 0 0 12px rgba(45,255,126,.1); }
  .status-badge.fault { color: var(--red);   border-color: var(--red);   background: rgba(255,59,59,.06);  animation: blink .6s infinite; }
  .status-badge.connecting { color: var(--muted); border-color: var(--muted); }

  /* ── Sparkline ── */
  .chart-section {
    border-top: 1px solid var(--border);
    padding: 14px 4px 0;
    display: flex; flex-direction: column; gap: 8px;
  }
  .chart-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .chart-title {
    font-size: 10px; font-weight: 700; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase;
  }
  .chart-range { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  #sparkline {
    width: 100%;
    height: 110px;
    display: block;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 4px;
  }
  .footer-meta { font-family: var(--mono); font-size: 13px; color: var(--muted); letter-spacing: 1px; }

  .restart-btn {
    font-family: var(--ui);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--amber);
    border: none;
    padding: 7px 22px;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: background .2s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .restart-btn:hover { background: #ffc04a; }
  .restart-btn:active { transform: scale(.96); }
  .restart-btn.spinning { background: var(--amber-dim); pointer-events: none; }
  .restart-btn.spinning::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.15) 50%, transparent 100%);
    animation: shimmer .8s infinite;
  }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

  /* scan line effect */
  .scan-line {
    position: fixed; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(245,166,35,.15), transparent);
    pointer-events: none; z-index: 10;
    animation: scan 6s linear infinite;
  }
  @keyframes scan { 0%{top:-2px} 100%{top:100vh} }
</style>
</head>
<body>
<div class="scan-line"></div>
<div class="shell">

  <header>
    <div style="display:flex;align-items:center;gap:0">
      <div class="logo">WILO <span>PRESSURE / PR12 P210</span></div>
    </div>
    <div class="hdr-right">
      <div class="conn-label" id="conn-label">CONNECTING</div>
      <div class="conn-dot" id="conn-dot"></div>
    </div>
  </header>

  <section class="readout">
    <div class="metric-card primary">
      <div class="metric-label">Pressure</div>
      <div class="metric-val sz-xl" id="pval">—</div>
      <div class="metric-unit">kPa</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Pressure</div>
      <div class="metric-val sz-lg" id="mpa">—</div>
      <div class="metric-unit">MPa</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Voltage</div>
      <div class="metric-val sz-lg" id="voltage">—</div>
      <div class="metric-unit">Volts</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Packet</div>
      <div class="metric-val sz-lg" id="pkt">—</div>
      <div class="metric-unit">Count</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Capacity</div>
      <div class="metric-val sz-lg" id="capacity">—</div>
      <div class="metric-unit">% of 100 kPa</div>
      <div style="margin-top:8px;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
        <div id="cap-bar" style="height:100%;width:0%;background:var(--amber);border-radius:2px;transition:width .5s ease"></div>
      </div>
    </div>
  </section>

  <section class="chart-section">
    <div class="chart-header">
      <div class="chart-title">Last 30 readings</div>
      <div class="chart-range" id="chart-range">— / — kPa</div>
    </div>
    <canvas id="sparkline"></canvas>
  </section>

  <footer>
    <div class="footer-meta" id="ts">LAST UPDATE: —</div>
    <div class="footer-meta" id="csv-info">CSV LOGGING ACTIVE</div>
    <button class="restart-btn" id="restart-btn" onclick="doRestart()">⟳ RESTART</button>
  </footer>

</div>

<script>
const history = [];
const MAX_PTS = 30;

const pval     = document.getElementById('pval');
const voltage  = document.getElementById('voltage');
const pktEl    = document.getElementById('pkt');
const mpaEl    = document.getElementById('mpa');
const capEl    = document.getElementById('capacity');
const capBar   = document.getElementById('cap-bar');
const P_MAX    = 100.0; // sensor max kPa
const tsEl    = document.getElementById('ts');
const dot     = document.getElementById('conn-dot');
const label   = document.getElementById('conn-label');
const canvas  = document.getElementById('sparkline');
const ctx     = canvas.getContext('2d');
const rangeEl = document.getElementById('chart-range');

function setConnState(state) {
  dot.className = 'conn-dot ' + state;
  label.textContent = state === 'live' ? 'LIVE' : state === 'fault' ? 'SENSOR FAULT' : state.toUpperCase();
}

function update(d) {
  if (d.status === 'connecting' || d.status === 'disconnected') {
    setConnState(d.status === 'connecting' ? 'connecting' : 'disconnected');
    return;
  }

  const kpa = d.pressure_kpa;
  const isFault = d.status === 'fault' || kpa < 0;

  function flashUpdate(el, val) {
    if (el.textContent !== String(val)) {
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    }
    el.textContent = val;
    el.classList.toggle('fault-val', isFault);
  }

  flashUpdate(pval,    isFault ? 'FAULT' : kpa.toFixed(2));
  flashUpdate(mpaEl,   isFault ? '—'     : d.pressure_mpa.toFixed(4));
  flashUpdate(voltage, d.voltage.toFixed(3));
  flashUpdate(pktEl,   d.packet);

  const pct = isFault ? 0 : Math.min(100, (kpa / P_MAX) * 100);
  capEl.textContent = isFault ? '—' : pct.toFixed(1) + '%';
  capBar.style.width = pct + '%';
  capBar.style.background = pct > 80 ? '#ff3b3b' : pct > 60 ? '#f5a623' : '#2dff7e';

  setConnState(isFault ? 'fault' : 'live');

  if (d.timestamp) {
    const t = new Date(d.timestamp);
    tsEl.textContent = 'LAST UPDATE: ' + t.toTimeString().slice(0,8);
  }

  if (!isFault) {
    history.push(kpa);
    if (history.length > MAX_PTS) history.shift();
    drawSparkline();
  }
}

function drawSparkline() {
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.offsetWidth;
  const H   = canvas.offsetHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  ctx.clearRect(0, 0, W, H);

  if (history.length < 2) return;

  const minV = Math.min(...history);
  const maxV = Math.max(...history);
  const span = maxV - minV || 1;
  const pad  = { t: 10, b: 22, l: 44, r: 10 };
  const cW   = W - pad.l - pad.r;
  const cH   = H - pad.t - pad.b;

  const xOf = i => pad.l + (i / (MAX_PTS - 1)) * cW;
  const yOf = v => pad.t + cH - ((v - minV) / span) * cH;

  // axes
  ctx.strokeStyle = '#1e1e28';
  ctx.lineWidth   = 1;
  // horizontal grid lines
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (i / 4) * cH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }

  // y-axis labels
  ctx.fillStyle   = '#44445a';
  ctx.font        = '9px "Share Tech Mono"';
  ctx.textAlign   = 'right';
  for (let i = 0; i <= 4; i++) {
    const v = minV + ((4 - i) / 4) * span;
    const y = pad.t + (i / 4) * cH;
    ctx.fillText(v.toFixed(1), pad.l - 6, y + 3);
  }

  // x labels
  ctx.textAlign = 'center';
  ctx.fillText('0', pad.l, H - 4);
  ctx.fillText(history.length + '', xOf(history.length - 1), H - 4);

  // fill area
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + cH);
  grad.addColorStop(0,   'rgba(245,166,35,.18)');
  grad.addColorStop(1,   'rgba(245,166,35,0)');
  ctx.beginPath();
  history.forEach((v, i) => {
    const x = xOf(i + (MAX_PTS - history.length));
    const y = yOf(v);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(xOf(MAX_PTS - 1), pad.t + cH);
  ctx.lineTo(xOf(MAX_PTS - history.length), pad.t + cH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // line
  ctx.beginPath();
  ctx.strokeStyle = '#f5a623';
  ctx.lineWidth   = 1.5;
  ctx.lineJoin    = 'round';
  history.forEach((v, i) => {
    const x = xOf(i + (MAX_PTS - history.length));
    const y = yOf(v);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // last point dot
  const lx = xOf(MAX_PTS - 1);
  const ly = yOf(history[history.length - 1]);
  ctx.beginPath();
  ctx.arc(lx, ly, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = '#f5a623';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(lx, ly, 6, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(245,166,35,.2)';
  ctx.fill();

  rangeEl.textContent = `${minV.toFixed(2)} / ${maxV.toFixed(2)} kPa`;
}

// SSE
function connect() {
  const es = new EventSource('/stream');
  es.onmessage = e => {
    try { update(JSON.parse(e.data)); } catch {}
  };
  es.onerror = () => {
    setConnState('disconnected');
    es.close();
    setTimeout(connect, 2000);
  };
}
connect();

// Restart
async function doRestart() {
  const btn = document.getElementById('restart-btn');
  btn.classList.add('spinning');
  btn.textContent = 'RESTARTING';
  await fetch('/restart', { method: 'POST' });
  setTimeout(() => {
    btn.classList.remove('spinning');
    btn.textContent = '⟳ RESTART';
  }, 1500);
}

// Resize sparkline
window.addEventListener('resize', drawSparkline);
</script>
</body>
</html>
